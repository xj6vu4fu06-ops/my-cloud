<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>即時留言列表系統 - 智慧無閃爍版</title>
    <style>
        body { 
            margin: 0; 
            background: radial-gradient(circle, #f3e5f5 0%, #ce93d8 100%); 
            height: 100vh; width: 100vw; overflow: hidden; 
            font-family: "Microsoft JhengHei", sans-serif; 
        }
        
        /* 列表容器 */
        #list-container {
            width: 80vw;
            max-width: 800px;
            margin: 5vh auto 0 auto;
            height: 70vh;
            display: flex;
            flex-direction: column;
            gap: 12px;
            box-sizing: border-box;
        }

        /* 每一列留言的樣式 */
        .list-item {
            background: rgba(255, 255, 255, 0.85);
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 20px;
            font-weight: bold;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: flex;
            align-items: center;
            /* 只有新渲染出來的元素才會微幅淡入 */
            animation: fadeIn 0.4s ease-out;
        }

        .item-number {
            margin-right: 15px;
            font-size: 16px;
            background: rgba(0,0,0,0.1);
            padding: 2px 8px;
            border-radius: 4px;
            color: #333;
        }

        @keyframes fadeIn { 0% { opacity: 0; } 100% { opacity: 1; } }

        /* 下方控制面板 */
        .control-panel {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .nav-btn {
            background: rgba(74, 20, 140, 0.8);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: background 0.2s;
        }
        .nav-btn:hover { background: rgba(74, 20, 140, 1); }

        .info-badge {
            background: white;
            color: #4a148c;
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: 900;
            border: 2px solid #4a148c;
            min-width: 120px;
            text-align: center;
        }

        /* 除錯小視窗 */
        #debug-info {
            position: fixed;
            top: 10px;
            left: 10px;
            z-index: 9999;
            background: rgba(0,0,0,0.5);
            color: #fff;
            padding: 5px 10px;
            font-size: 12px;
            border-radius: 5px;
            pointer-events: none;
        }

        /* 右下角祈福按鈕 */
        #trigger-btn {
            position: fixed;
            bottom: 30px;
            right: 40px;
            z-index: 1001;
            background: transparent;
            border: none;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
    </style>
</head>
<body>

    <div id="debug-info">正在連線至表單...</div>

    <!-- 呈現 B 欄資料的容器 -->
    <div id="list-container"></div>

    <!-- 下方改成：上一頁、記錄、下一頁 -->
    <div class="control-panel">
        <button class="nav-btn" onclick="changePage(-1)">⬅ 上一頁</button>
        <div class="info-badge" id="page-counter">頁數 0 / 0</div>
        <button class="nav-btn" onclick="changePage(1)">下一頁 ➡</button>
    </div>

    <!-- 右下角祈福按鈕與修正文字 -->
    <button id="trigger-btn" onclick="triggerAI()">
        <img src="./my-button.gif" style="width: 120px; height: auto; margin-bottom: 10px;" onerror="this.src='https://cdn-icons-png.flaticon.com/512/1077/1077114.png'">
        <div style="color: #B76E79; font-size: 18px; font-weight: 900; text-shadow: 0 0 10px #fff; line-height: 1.3; text-align: center;">
            阿彌陀佛<br>
            對我開心<br>
            為你明心見性
        </div>
    </button>

    <script>
        const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRJMkp363s_yYnDuk1V89GMRKsV3cosMJhDhn2zTqzb9uWFmKZxImpCG8XP3EnjNgvSkdQaG7tKJbts/pub?output=csv";
        const webhookUrl = "https://hook.us2.make.com/to36jd8jhtw2hmda6wd92h14zdlhjz2u";

        let allUserTexts = [];   // 記憶體中儲存的所有舊資料
        let currentPage = 1;     // 目前頁碼
        const itemsPerPage = 10;   // 每頁顯示 10 條

        async function fetchWords() {
            try {
                // 每 1 秒輪詢一次試算表
                const response = await fetch(csvUrl + "&cachebust=" + new Date().getTime());
                const csvText = await response.text();
                
                const rows = parseCSV(csvText);
                if (rows.length < 1) return;

                let latestTexts = [];

                // 從第 1 列開始撈取最新 B 欄內容
                for (let i = 1; i < rows.length; i++) {
                    const columns = rows[i];
                    if (columns.length < 2) continue;

                    const userText = columns[1]?.trim();
                    if (userText && userText !== "") {
                        latestTexts.push(userText);
                    }
                }

                // 【關鍵修改】：檢查當前頁面範圍內的資料是否有變動
                const isDataChanged = JSON.stringify(latestTexts) !== JSON.stringify(allUserTexts);
                
                if (isDataChanged) {
                    // 計算在更新前，當前頁面渲染的內容快照
                    const oldPageSnapshot = getCurrentPageData(allUserTexts, currentPage);
                    // 計算如果套用新資料，當前頁面應該長怎樣
                    const newPageSnapshot = getCurrentPageData(latestTexts, currentPage);
                    
                    // 先把背後的完整資料庫更新
                    allUserTexts = latestTexts;

                    // 只有當「目前眼睛看到的這一頁」內容真的有變時，才刷新 DOM 畫面
                    if (JSON.stringify(oldPageSnapshot) !== JSON.stringify(newPageSnapshot)) {
                        updateListDisplay();
                    } else {
                        // 雖然有新訊息，但不在當前頁面（可能在後面幾頁），我們只更新頁碼數字，不閃爍重繪列表
                        updatePageCounterOnly();
                    }
                }

                document.getElementById('debug-info').innerText = `總留言數: ${allUserTexts.length}`;

            } catch (e) {
                console.error("Fetch Error:", e);
                document.getElementById('debug-info').innerText = "連線失敗";
            }
        }

        // 輔助函式：切片取得特定資料庫在某個頁面的 10 筆資料
        function getCurrentPageData(dataArray, page) {
            const startIndex = (page - 1) * itemsPerPage;
            const endIndex = Math.min(startIndex + itemsPerPage, dataArray.length);
            return dataArray.slice(startIndex, endIndex);
        }

        // 穩定的 CSV 解析函式
        function parseCSV(text) {
            const rows = [];
            let currentRow = [];
            let currentField = '';
            let inQuotes = false;

            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                const nextChar = text[i + 1];

                if (char === '"' && inQuotes && nextChar === '"') {
                    currentField += '"'; i++;
                } else if (char === '"') {
                    inQuotes = !inQuotes;
                } else if (char === ',' && !inQuotes) {
                    currentRow.push(currentField);
                    currentField = '';
                } else if ((char === '\r' || char === '\n') && !inQuotes) {
                    if (currentField || currentRow.length > 0) {
                        currentRow.push(currentField);
                        rows.push(currentRow);
                        currentRow = [];
                        currentField = '';
                    }
                    if (char === '\r' && nextChar === '\n') i++;
                } else {
                    currentField += char;
                }
            }
            if (currentField || currentRow.length > 0) {
                currentRow.push(currentField);
                rows.push(currentRow);
            }
            return rows;
        }

        // 只有在當前頁面內容變動時，才會執行的重繪函式
        function updateListDisplay() {
            const container = document.getElementById('list-container');
            container.innerHTML = ''; // 清空舊內容

            const totalItems = allUserTexts.length;
            const totalPages = Math.ceil(totalItems / itemsPerPage) || 1;

            if (currentPage > totalPages) currentPage = totalPages;

            const startIndex = (currentPage - 1) * itemsPerPage;
            const endIndex = Math.min(startIndex + itemsPerPage, totalItems);

            for (let i = startIndex; i < endIndex; i++) {
                const div = document.createElement('div');
                div.className = 'list-item';
                
                const itemColor = `hsl(${(i * 35) % 360}, 75%, 35%)`;
                div.style.color = itemColor;
                div.style.borderLeft = `6px solid ${itemColor}`;

                const numSpan = document.createElement('span');
                numSpan.className = 'item-number';
                numSpan.innerText = `#${i + 1}`;

                const textNode = document.createTextNode(allUserTexts[i]);

                div.appendChild(numSpan);
                div.appendChild(textNode);
                container.appendChild(div);
            }

            updatePageCounterOnly();
        }

        // 僅更新下方的分頁數字標籤，不影響上方的文字看板
        function updatePageCounterOnly() {
            const pageCounter = document.getElementById('page-counter');
            const totalPages = Math.ceil(allUserTexts.length / itemsPerPage) || 1;
            pageCounter.innerText = `頁數 ${currentPage} / ${totalPages}`;
        }

        // 切換頁碼（換頁時必須重繪）
        function changePage(dir) {
            const totalPages = Math.ceil(allUserTexts.length / itemsPerPage) || 1;
            currentPage += dir;
            
            if (currentPage < 1) currentPage = totalPages;
            if (currentPage > totalPages) currentPage = 1;

            updateListDisplay();
        }

        function triggerAI() {
            fetch(webhookUrl)
            .then(() => alert("✨ 祈福成功！AI 正在彙整新紀錄。"))
            .catch(() => alert("連線失敗"));
        }

        // 每 1 秒向 Google Sheets 查一次是否有更新
        setInterval(fetchWords, 1000);
        fetchWords();
    </script>
</body>
</html>
