<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>即時文字雲系統 - 穩定相容版</title>
    <style>
        body { 
            margin: 0; 
            background: radial-gradient(circle, #f3e5f5 0%, #ce93d8 100%); 
            height: 100vh; width: 100vw; overflow: hidden; 
            font-family: "Microsoft JhengHei", sans-serif; 
        }
        #canvas { width: 100vw; height: 100vh; position: relative; z-index: 1; }
        .word {
            position: absolute; transition: all 1s ease-out;
            white-space: nowrap; cursor: default;
            animation: popIn 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: inline-block; font-weight: bold;
        }
        @keyframes popIn { 0% { opacity: 0; transform: scale(0); } 100% { opacity: 1; transform: scale(1); } }

        #ai-focus {
            position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%);
            width: 85vw; text-align: center; font-size: 55px; font-weight: 900;
            color: #4a148c; text-shadow: 0 0 30px #fff; z-index: 999;
            pointer-events: none; transition: opacity 0.8s; line-height: 1.4;
        }

        .control-panel {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            z-index: 1000; display: flex; align-items: center; gap: 20px;
        }

        .nav-btn {
            background: rgba(74, 20, 140, 0.8); color: white; border: none;
            padding: 12px 25px; border-radius: 50px; font-size: 18px;
            font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .info-badge {
            background: white; color: #4a148c; padding: 8px 20px;
            border-radius: 20px; font-weight: 900; border: 2px solid #4a148c;
            min-width: 120px; text-align: center;
        }

        /* 除錯小視窗：如果還是沒畫面，看這裡的數字 */
        #debug-info {
            position: fixed; top: 10px; left: 10px; z-index: 9999;
            background: rgba(0,0,0,0.5); color: #fff; padding: 5px 10px;
            font-size: 12px; border-radius: 5px; pointer-events: none;
        }

        #trigger-btn {
            position: fixed; bottom: 30px; right: 40px; z-index: 1001;
            background: transparent; border: none; cursor: pointer;
            display: flex; flex-direction: column; align-items: center;
        }
    </style>
</head>
<body>

    <div id="debug-info">正在連線至表單...</div>
    <div id="ai-focus">等待開釋中...</div>

    <div class="control-panel">
        <button class="nav-btn" onclick="changeAiIndex(-1)">⬅ 上一則</button>
        <div class="info-badge" id="ai-counter">紀錄 0 / 0</div>
        <button class="nav-btn" onclick="changeAiIndex(1)">下一則 ➡</button>
    </div>

    <button id="trigger-btn" onclick="triggerAI()">
        <img src="./my-button.gif" style="width: 120px; height: auto; margin-bottom: 10px;" onerror="this.src='https://cdn-icons-png.flaticon.com/512/1077/1077114.png'">
        <div style="color: #B76E79; font-size: 20px; font-weight: 900; text-shadow: 0 0 10px #fff;">
            阿彌陀佛<br><span style="font-size: 16px;">~點我開釋~</span>
        </div>
    </button>

    <div id="canvas"></div>

    <script>
        const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRJMkp363s_yYnDuk1V89GMRKsV3cosMJhDhn2zTqzb9uWFmKZxImpCG8XP3EnjNgvSkdQaG7tKJbts/pub?output=csv";
        const webhookUrl = "https://hook.us2.make.com/to36jd8jhtw2hmda6wd92h14zdlhjz2u";

        let renderedLines = new Set();
        let aiMessages = [];
        let currentAiIndex = -1;

        async function fetchWords() {
            try {
                const response = await fetch(csvUrl + "&cachebust=" + new Date().getTime());
                const csvText = await response.text();
                
                // 使用更精確的 CSV 解析
                const rows = parseCSV(csvText);
                if (rows.length < 1) return;

                const debug = document.getElementById('debug-info');
                let tempAiMessages = [];
                let bCount = 0;

                // 從第 1 列開始（排除標題列）
                for (let i = 1; i < rows.length; i++) {
                    const columns = rows[i];
                    if (columns.length < 2) continue;

                    // 嘗試自動定位：
                    // 通常 B 欄在 index 1，C 欄在 index 2
                    const userText = columns[1]?.trim();
                    const aiText = columns[2]?.trim();

                    // 處理 B 欄文字雲
                    if (userText && userText !== "" && !renderedLines.has(userText)) {
                        createWord(userText);
                        renderedLines.add(userText);
                        bCount++;
                    }

                    // 處理 C 欄 AI 總結
                    if (aiText && aiText !== "" && aiText !== "AI總結" && aiText !== "AI 總結") {
                        tempAiMessages.push(aiText);
                    }
                }

                debug.innerText = `留言數: ${renderedLines.size} | AI紀錄: ${tempAiMessages.length}`;

                // 更新 AI 訊息
                if (tempAiMessages.length !== aiMessages.length) {
                    const isFirstLoad = aiMessages.length === 0;
                    aiMessages = tempAiMessages;
                    if (isFirstLoad || currentAiIndex >= aiMessages.length - 2) {
                        currentAiIndex = aiMessages.length - 1;
                    }
                    updateAiDisplay();
                }

            } catch (e) {
                console.error("Fetch Error:", e);
                document.getElementById('debug-info').innerText = "連線失敗";
            }
        }

        // 穩定的 CSV 解析函式 (處理引號與逗號)
        function parseCSV(text) {
            const rows = [];
            let currentRow = [];
            let currentField = '';
            let inQuotes = false;

            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                const nextChar = text[i + 1];

                if (char === '"' && inQuotes && nextChar === '"') {
                    currentField += '"'; i++;
                } else if (char === '"') {
                    inQuotes = !inQuotes;
                } else if (char === ',' && !inQuotes) {
                    currentRow.push(currentField);
                    currentField = '';
                } else if ((char === '\r' || char === '\n') && !inQuotes) {
                    if (currentField || currentRow.length > 0) {
                        currentRow.push(currentField);
                        rows.push(currentRow);
                        currentRow = [];
                        currentField = '';
                    }
                    if (char === '\r' && nextChar === '\n') i++;
                } else {
                    currentField += char;
                }
            }
            if (currentField || currentRow.length > 0) {
                currentRow.push(currentField);
                rows.push(currentRow);
            }
            return rows;
        }

        function updateAiDisplay() {
            const aiDisplay = document.getElementById('ai-focus');
            const counter = document.getElementById('ai-counter');
            if (aiMessages.length > 0) {
                aiDisplay.style.opacity = "0";
                setTimeout(() => {
                    aiDisplay.innerText = aiMessages[currentAiIndex];
                    aiDisplay.style.opacity = "1";
                    counter.innerText = `紀錄 ${currentAiIndex + 1} / ${aiMessages.length}`;
                }, 400);
            }
        }

        function changeAiIndex(dir) {
            if (aiMessages.length === 0) return;
            currentAiIndex += dir;
            if (currentAiIndex < 0) currentAiIndex = aiMessages.length - 1;
            if (currentAiIndex >= aiMessages.length) currentAiIndex = 0;
            updateAiDisplay();
        }

        function createWord(text) {
            const span = document.createElement('span');
            span.className = 'word';
            span.innerText = text;
            span.style.fontSize = (Math.floor(Math.random() * 20) + 24) + 'px';
            span.style.color = `hsl(${Math.random() * 360}, 70%, 40%)`;
            span.style.left = (Math.random() * 75 + 10) + '%';
            span.style.top = (Math.random() * 75 + 10) + '%';
            span.style.transform = `rotate(${(Math.random() * 20 - 10)}deg)`;
            document.getElementById('canvas').appendChild(span);
        }

        function triggerAI() {
            fetch(webhookUrl)
            .then(() => alert("✨ 祈福成功！AI 正在彙整新紀錄。"))
            .catch(() => alert("連線失敗"));
        }

        setInterval(fetchWords, 3000);
        fetchWords();
    </script>
</body>
</html>
