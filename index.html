<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>即時共識文字雲</title>
    <style>
        body { margin: 0; background: white; overflow: hidden; font-family: "Microsoft JhengHei", sans-serif; }
        #canvas { width: 100vw; height: 100vh; position: relative; }
        .word {
            position: absolute;
            transition: all 2s ease-in-out;
            white-space: nowrap;
            cursor: default;
            animation: fadeIn 1.5s ease-out;
        }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.5); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>
    <div id="canvas"></div>

    <script>
        // 🚨 請把下面這串網址換成你剛才複製的 Google Sheets CSV 網址
        const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRJMkp363s_yYnDuk1V89GMRKsV3cosMJhDhn2zTqzb9uWFmKZxImpCG8XP3EnjNgvSkdQaG7tKJbts/pub?output=csv";

        async function fetchWords() {
            try {
                const response = await fetch(csvUrl);
                const data = await response.text();
                const lines = data.split('\n').slice(1); 
                const wordCounts = {};

                lines.forEach(line => {
                    const columns = line.split(',');
                    const text = columns[1]?.trim(); 
                    if (text) wordCounts[text] = (wordCounts[text] || 0) + 1;
                });

                renderCloud(wordCounts);
            } catch (e) { console.error("抓取失敗", e); }
        }

        function renderCloud(counts) {
            const canvas = document.getElementById('canvas');
            canvas.innerHTML = ''; 
            
            Object.keys(counts).forEach(text => {
                const span = document.createElement('span');
                span.className = 'word';
                span.innerText = text;
                
                const count = counts[text];
                const fontSize = Math.min(20 + (count * 15), 120); 
                
                span.style.fontSize = fontSize + 'px';
                span.style.color = `rgba(0, 0, 0, ${Math.random() * 0.5 + 0.5})`; 
                span.style.left = (Math.random() * 80 + 5) + '%';
                span.style.top = (Math.random() * 80 + 5) + '%';
                span.style.fontWeight = count > 1 ? 'bold' : 'normal';

                canvas.appendChild(span);
            });
        }

        setInterval(fetchWords, 5000);
        fetchWords();
    </script>
</body>
</html>
