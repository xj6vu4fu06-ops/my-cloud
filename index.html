<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>即時平滑文字雲</title>
    <style>
      body { 
    margin: 0; 
    /* 這裡改成夢幻淡紫色漸層 */
    background: radial-gradient(circle, #f3e5f5 0%, #ce93d8 100%); 
    height: 100vh;
    width: 100vw;
    overflow: hidden; 
    font-family: "Microsoft JhengHei", sans-serif; 
}
        #canvas { width: 100vw; height: 100vh; position: relative; }
        .word {
            position: absolute;
            transition: all 1s ease-out;
            white-space: nowrap;
            cursor: default;
            animation: popIn 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* 彈跳出現效果 */
            display: inline-block;
        }
        @keyframes popIn {
            0% { opacity: 0; transform: scale(0) rotate(-15deg); }
            100% { opacity: 1; transform: scale(1) rotate(0deg); }
        }
    </style>
</head>
<body>
    <button onclick="triggerAI()" style="
    position: fixed; 
    bottom: 30px; 
    right: 30px; 
    z-index: 1000; 
    padding: 15px 30px; 
    background: linear-gradient(135deg, #6e8efb, #a777e3); 
    color: white; 
    border: none; 
    border-radius: 50px; 
    cursor: pointer; 
    font-size: 20px; 
    font-weight: bold;
    box-shadow: 0 10px 20px rgba(0,0,0,0.3);
    transition: 0.3s;">
    🪄 1, 2, 3 看共識！
        </button>
    <div id="canvas"></div>

    <script>
    const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRJMkp363s_yYnDuk1V89GMRKsV3cosMJhDhn2zTqzb9uWFmKZxImpCG8XP3EnjNgvSkdQaG7tKJbts/pub?output=csv";
    
    // 💡 關鍵：用來儲存「已經畫在螢幕上」的每一列原始資料
    let renderedLines = new Set(); 

    async function fetchWords() {
        try {
            // 強制抓取最新資料
            const response = await fetch(csvUrl + "&t=" + new Date().getTime());
            const data = await response.text();
            const lines = data.split('\n').slice(1); // 排除標題列
            
            const canvas = document.getElementById('canvas');

            lines.forEach(line => {
                const trimmedLine = line.trim();
                
                // 💡 核心邏輯：如果這行資料「從未出現過」，才幫它建立新標籤
                if (trimmedLine !== "" && !renderedLines.has(trimmedLine)) {
                    
                    const columns = trimmedLine.split(',');
                    const text = columns[columns.length - 1]?.trim(); 

                    if (text && text !== "") {
                        const span = document.createElement('span');
                        span.className = 'word';
                        span.innerText = text;
                        
                        // 隨機樣式
                        const fontSize = Math.floor(Math.random() * 40) + 30; 
                        span.style.fontSize = fontSize + 'px';
                        span.style.color = 'hsl(' + (Math.random() * 360) + ', 70%, 50%)'; 
                        
                        // 隨機位置
                        span.style.left = (Math.random() * 85 + 5) + '%';
                        span.style.top = (Math.random() * 85 + 5) + '%';
                        span.style.transform = `rotate(${(Math.random() - 0.5) * 20}deg)`;

                        canvas.appendChild(span);
                        
                        // 把這行加入「已完成名單」，下次就不會再畫它
                        renderedLines.add(trimmedLine);
                    }
                }
            });
        } catch (e) { console.error("抓取失敗", e); }
    }

    // 每 2 秒巡邏一次 Google Sheets
    setInterval(fetchWords, 2000);
    fetchWords();
</script>
    <script>
function triggerAI() {
    // 這是你的專屬 Webhook 網址
    const webhookUrl = "https://hook.us2.make.com/htwvglndp285dh85o67fvuk7pa5uwmyn";
    
    // 按下後先給個提示，避免重複狂按
    console.log("正在啟動 AI 總結...");
    
    fetch(webhookUrl)
    .then(response => {
        alert("✨ AI 正在讀取全場留言並進行總結，請稍候 5-10 秒！");
    })
    .catch(error => {
        alert("連線失敗，請檢查網路狀態。");
    });
}
</script>
</body>
</html>
