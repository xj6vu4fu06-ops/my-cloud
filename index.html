<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>即時文字雲與 AI 智慧總結系統</title>
    <style>
        body { 
            margin: 0; 
            background: radial-gradient(circle, #f3e5f5 0%, #ce93d8 100%); 
            height: 100vh;
            width: 100vw;
            overflow: hidden; 
            font-family: "Microsoft JhengHei", sans-serif; 
        }
        #canvas { width: 100vw; height: 100vh; position: relative; z-index: 1; }
        
        /* 文字雲單字樣式 */
        .word {
            position: absolute;
            transition: all 1s ease-out;
            white-space: nowrap;
            cursor: default;
            animation: popIn 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: inline-block;
        }
        @keyframes popIn {
            0% { opacity: 0; transform: scale(0); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* AI 總結顯示區域 */
        #ai-focus {
            position: fixed;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85vw;
            text-align: center;
            font-size: 60px;
            font-weight: 900;
            color: #4a148c;
            text-shadow: 0 0 30px #fff, 0 0 10px rgba(74, 20, 140, 0.3);
            z-index: 999;
            pointer-events: none;
            transition: opacity 0.8s;
            line-height: 1.4;
        }

        /* 控制按鈕容器 */
        .control-panel {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .nav-btn {
            background: rgba(74, 20, 140, 0.8);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .nav-btn:hover {
            background: #4a148c;
            transform: scale(1.05);
        }

        .info-badge {
            background: white;
            color: #4a148c;
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: 900;
            border: 2px solid #4a148c;
            min-width: 100px;
            text-align: center;
        }

        /* 原有的觸發按鈕樣式 */
        #trigger-btn {
            position: fixed;
            bottom: 30px;
            right: 40px;
            z-index: 1001;
            background: transparent;
            border: none;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            outline: none;
        }
    </style>
</head>
<body>

    <div id="ai-focus">等待 AI 彙整訊息...</div>

    <div class="control-panel">
        <button class="nav-btn" onclick="changeAiIndex(-1)">⬅ 上一則</button>
        <div class="info-badge" id="ai-counter">AI 智慧紀錄</div>
        <button class="nav-btn" onclick="changeAiIndex(1)">下一則 ➡</button>
    </div>

    <button id="trigger-btn" onclick="triggerAI()">
        <img src="./my-button.gif" style="width: 120px; height: auto; margin-bottom: 10px;" onerror="this.src='https://cdn-icons-png.flaticon.com/512/1077/1077114.png'">
        <div style="color: #B76E79; font-size: 20px; font-weight: 900; text-shadow: 0 0 10px #fff;">
            阿彌陀佛<br><span style="font-size: 16px;">~點我開釋~</span>
        </div>
    </button>

    <div id="canvas"></div>
