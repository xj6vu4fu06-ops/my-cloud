<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>即時平滑文字雲</title>
    <style>
      body { 
    margin: 0; 
    /* 這裡改成夢幻淡紫色漸層 */
    background: radial-gradient(circle, #f3e5f5 0%, #ce93d8 100%); 
    height: 100vh;
    width: 100vw;
    overflow: hidden; 
    font-family: "Microsoft JhengHei", sans-serif; 
}
        #canvas { width: 100vw; height: 100vh; position: relative; }
        .word {
            position: absolute;
            transition: all 1s ease-out;
            white-space: nowrap;
            cursor: default;
            animation: popIn 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* 彈跳出現效果 */
            display: inline-block;
        }
        @keyframes popIn {
            0% { opacity: 0; transform: scale(0) rotate(-15deg); }
            100% { opacity: 1; transform: scale(1) rotate(0deg); }
        }
    </style>
</head>
<body>
    <button onclick="triggerAI()" style="
    position: fixed; 
    bottom: 30px; 
    right: 30px; 
    z-index: 1000; 
    padding: 15px 30px; 
    background: linear-gradient(135deg, #6e8efb, #a777e3); 
    color: white; 
    border: none; 
    border-radius: 50px; 
    cursor: pointer; 
    font-size: 20px; 
    font-weight: bold;
    box-shadow: 0 10px 20px rgba(0,0,0,0.3);
    transition: 0.3s;">
    🪄 1, 2, 3 看共識！
        </button>
    <div id="canvas"></div>

    <script>
    const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRJMkp363s_yYnDuk1V89GMRKsV3cosMJhDhn2zTqzb9uWFmKZxImpCG8XP3EnjNgvSkdQaG7tKJbts/pub?output=csv";
    
    // 💡 關鍵：用來儲存「已經畫在螢幕上」的每一列原始資料
    let renderedLines = new Set(); 

async function fetchWords() {
        try {
            // 加上時間戳記確保抓到的是最新版 CSV
            const response = await fetch(csvUrl + "&t=" + new Date().getTime());
            const data = await response.text();
            
            // 解析 CSV 行
            const lines = data.split(/\r?\n/).slice(1); 
            const canvas = document.getElementById('canvas');
            const aiDisplay = document.getElementById('ai-focus');

            lines.forEach((line, index) => {
                if (!line.trim()) return;

                // 準確切割欄位
                const columns = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                
                // 1. 處理 B 欄：使用者留言 (小字)
                const userText = columns[1]?.replace(/^"|"$/g, '').trim(); 
                
                // 💡 關鍵修正：檢查這個字是否「已經被畫在畫面上」了
                if (userText && userText !== "" && !renderedLines.has(userText)) {
                    const span = document.createElement('span');
                    span.className = 'word';
                    span.innerText = userText;
                    
                    const fontSize = Math.floor(Math.random() * 30) + 25; 
                    span.style.fontSize = fontSize + 'px';
                    span.style.color = 'hsl(' + (Math.random() * 360) + ', 70%, 50%)'; 
                    
                    span.style.left = (Math.random() * 80 + 10) + '%';
                    span.style.top = (Math.random() * 80 + 10) + '%';
                    span.style.transform = `rotate(${(Math.random() - 0.5) * 20}deg)`;

                    canvas.appendChild(span);
                    
                    // 紀錄這個內容，下次就不重複畫
                    renderedLines.add(userText);
                }

                // 2. 處理 C 欄：AI 總結 (大字)
                // 雖然 AI 寫在第 2 列，但我們掃描整張表，有字就更新
                const aiTextFromCell = columns[2]?.replace(/^"|"$/g, '').trim();
                if (aiTextFromCell && aiTextFromCell !== "" && aiTextFromCell !== lastAiText) {
                    aiDisplay.innerText = aiTextFromCell;
                    lastAiText = aiTextFromCell;
                }
            });
        } catch (e) { 
            console.error("更新失敗:", e); 
        }
    }

    // 每 2 秒巡邏一次 Google Sheets
    setInterval(fetchWords, 2000);
    fetchWords();
</script>
    <script>
function triggerAI() {
    // 這是你的專屬 Webhook 網址
    const webhookUrl = "https://hook.us2.make.com/2ieu9u3wqz131jy2xzney2bpeserlpbh";
    
    // 按下後先給個提示，避免重複狂按
    console.log("正在啟動 AI 總結...");
    
    fetch(webhookUrl)
    .then(response => {
        alert("✨ AI 正在讀取全場留言並進行總結，請稍候 5-10 秒！");
    })
    .catch(error => {
        alert("連線失敗，請檢查網路狀態。");
    });
}
</script>
</body>
</html>
